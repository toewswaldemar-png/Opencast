name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # Linux-Builds + WASAPI-Client (kein CGO nötig)
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy frontend dist to server
        run: cp -r frontend/dist server/dist

      - name: Build server (Linux)
        working-directory: server
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o opencast-server-linux-amd64 .

      - name: Build server (Windows)
        working-directory: server
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o opencast-server.exe .

      - name: Build client WASAPI (Windows)
        working-directory: client
        run: GOOS=windows GOARCH=amd64 go build -o opencast-client.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            server/opencast-server-linux-amd64
            server/opencast-server.exe
            client/opencast-client.exe

  # ASIO-Client: benötigt MinGW + ASIO SDK
  build-asio:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: client/go.sum

      - name: ASIO SDK entpacken
        shell: pwsh
        env:
          ASIO_SDK_ZIP: ${{ secrets.ASIO_SDK_ZIP_B64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:ASIO_SDK_ZIP)
          [IO.File]::WriteAllBytes("$env:TEMP\asiosdk.zip", $bytes)
          New-Item -ItemType Directory -Force -Path ASIOSDK\common | Out-Null
          Expand-Archive "$env:TEMP\asiosdk.zip" -DestinationPath ASIOSDK\common -Force

      - name: Build client ASIO (Windows)
        working-directory: client
        run: go build -tags asio -o opencast-client-asio.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: asio-build
          path: client/opencast-client-asio.exe

  # Release erstellen sobald beide Jobs fertig sind
  release:
    needs: [build-linux, build-asio]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: asio-build
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
